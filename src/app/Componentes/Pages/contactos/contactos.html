<div class="container-redes">
    <h2 class="subtitulo-redes">Nuestras Redes</h2>

    <div class="redes-card">
        <img src="/fb.png" class="red-fb" alt="Facebook"/>
        <a class="text-redes" href="facebook.com">Facebook</a>
    </div>

    <div class="redes-card">
        <img src="/ig.jpeg" class="icon-ig" alt="Instagram"/>
        <a class="text-redes" href="Instagram.com">Instagram</a>
    </div>

    <div class="redes-card">
        <img src="/gmail.png" class="icon-gmail" alt="Gmail"/>
        <a class="text-redes" href="Gmail.com">Gmail</a>
    </div>

    <div class="redes-card">
        <img src="/wsp.jpeg" class="icon-wsp" alt="WhatsApp"/>
        <a class="text-redes" href="WhatsApp.com">WhatsApp</a>

<div class="container-contacto">
    <div>
        <h2 class="subtitulo-contacto"> Comuníquese con nosotros </h2>
        <form>
            
            <div class="campo">
                <label for="nombre"> Nombre: </label>
                <input type="text" id="nombre" placeholder="Ingrese su nombre">
            </div>

            <div class="campo">
                <label for="apellido"> Apellido: </label>
                <input type="text" id="apellido" placeholder="Ingrese su apellido">
            </div>
                
            <div class="campo">
                <label for="email"> Correo Eléctronico: </label>
                <input type="text" id="email" placeholder="Ingrese su correo">
            </div>

            <div class="campo">
                <label for="telefomo"> Teléfono: </label>
                <input type="text" id="telefono" placeholder="Ingrese su número">
            </div>

            <div class="campo">
                <label for="mensaje"> Comentario o Mensaje: </label>
                <textarea type="text" id="mensaje" placeholder="Ingrese su mensaje o comentario"></textarea>
            </div>

            <button>Enviar</button>

        </form>
    </div>
</div>
